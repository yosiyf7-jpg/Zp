<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lumi AI</title>

    <!-- منع الـ Cache للـ HTML بس (عشان دايماً نشوف آخر نسخة) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- ✨ PWA Meta Tags -->
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Lumi AI - مساعدك الذكي">

    <!-- ✨ iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lumi AI">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- ✨ Windows Support -->
    <meta name="msapplication-TileColor" content="#2563eb">
    <meta name="msapplication-TileImage" content="icons/icon-192.png">

    <!-- ✨ Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <!-- ✨ Web App Manifest -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/style.css?v=1.2">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/highlight.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>

<div class="app">

    <aside id="sidebar">

        <div class="sidebar-header">

            <div class="logo">
                🤖 Lumi AI
            </div>

            <button id="close-sidebar" title="إغلاق">✕</button>

        </div>

        <button id="new-chat">
            + محادثة جديدة
        </button>

        <div class="search-wrapper">

            <input
                type="text"
                id="search-input"
                placeholder="🔍 ابحث في المحادثات..."
                autocomplete="off">

            <button id="search-clear" title="مسح البحث">✕</button>

        </div>

        <div id="search-results-info"></div>

        <div id="chat-list"></div>

    </aside>

    <main>

        <!-- ✨ مؤشر Offline -->
        <div id="offline-indicator" class="offline-indicator">
            📡 لا يوجد اتصال بالإنترنت
        </div>

        <header>

            <button id="menu" title="القائمة">☰</button>

            <h2>Lumi AI</h2>

            <div class="header-actions">

                <div class="export-wrapper">

                    <button id="export-btn" title="تصدير المحادثة">📤</button>

                    <div class="export-menu" id="export-menu">

                        <button data-format="txt">
                            📄 تصدير كملف نصي (TXT)
                        </button>

                        <button data-format="md">
                            📋 تصدير كملف Markdown (MD)
                        </button>

                        <button data-format="png">
                            🖼️ تصدير كصورة (PNG)
                        </button>

                    </div>

                </div>

                <button id="settings-btn" title="الإعدادات">⚙️</button>

                <button id="clear-chat" title="حذف المحادثة">🗑️</button>

            </div>

        </header>

        <section id="messages"></section>

        <div id="image-preview" class="image-preview">

            <img id="image-preview-img" src="" alt="Preview">

            <div class="image-preview-info">

                <span id="image-preview-name"></span>

                <button id="image-preview-remove" title="إزالة الصورة">
                    ✕
                </button>

            </div>

        </div>

        <footer>

            <input
                type="file"
                id="image-input"
                accept="image/*"
                hidden>

            <button id="image-btn" title="إرفاق صورة">
                📷
            </button>

            <textarea
                id="prompt"
                rows="1"
                placeholder="اكتب رسالتك..."></textarea>

            <button id="send" title="إرسال">
                ➤
            </button>

        </footer>

    </main>

</div>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ✨ بانر تثبيت التطبيق -->
<div id="install-banner" class="install-banner">

    <div class="install-banner-content">

        <div class="install-banner-icon">📱</div>

        <div class="install-banner-text">
            <strong>ثبّت التطبيق</strong>
            <span>احصل على تجربة أفضل مع Lumi AI</span>
        </div>

        <div class="install-banner-actions">
            <button id="install-btn" class="install-btn">تثبيت</button>
            <button id="install-close" class="install-close">✕</button>
        </div>

    </div>

</div>

<div class="modal-overlay" id="settings-modal">

    <div class="modal">

        <div class="modal-header">
            <h2>⚙️ الإعدادات</h2>
            <button class="modal-close" id="settings-close">✕</button>
        </div>

        <div class="settings-section">
            <label class="settings-label">🌓 وضع العرض</label>
            <div class="theme-toggle" id="theme-toggle">
                <button data-value="dark">🌙 داكن</button>
                <button data-value="light">☀️ فاتح</button>
            </div>
        </div>

        <div class="settings-section">
            <label class="settings-label">🎨 اللون الرئيسي</label>
            <div class="color-picker" id="color-picker">
                <div class="color-option" data-value="blue"   title="أزرق"></div>
                <div class="color-option" data-value="green"  title="أخضر"></div>
                <div class="color-option" data-value="purple" title="بنفسجي"></div>
                <div class="color-option" data-value="pink"   title="وردي"></div>
                <div class="color-option" data-value="orange" title="برتقالي"></div>
                <div class="color-option" data-value="red"    title="أحمر"></div>
            </div>
        </div>

        <div class="settings-section">
            <label class="settings-label">🔤 حجم الخط</label>
            <div class="font-size-picker" id="font-size-picker">
                <button data-value="small">صغير</button>
                <button data-value="medium">متوسط</button>
                <button data-value="large">كبير</button>
            </div>
        </div>

        <div class="settings-section">
            <div class="switch-row">
                <label class="settings-label" style="margin:0;">
                    🔊 صوت الإشعارات
                </label>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-section">
            <div class="switch-row">
                <label class="settings-label" style="margin:0;">
                    ✨ تفعيل الأنيميشن
                </label>
                <label class="switch">
                    <input type="checkbox" id="animations-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- ✨ قسم PWA -->
        <div class="settings-section pwa-section">

            <label class="settings-label">📱 التطبيق</label>

            <div id="pwa-status" class="pwa-status">
                <span id="pwa-status-icon">🌐</span>
                <span id="pwa-status-text">شغال في المتصفح</span>
            </div>

            <button id="install-app-btn" class="install-app-btn" style="display:none;">
                📥 تثبيت التطبيق
            </button>

            <button id="clear-cache-btn" class="clear-cache-btn">
                🔄 مسح الكاش وإعادة التحميل
            </button>

        </div>

        <div class="settings-section">
            <button class="reset-btn" id="reset-settings">
                🔄 إعادة الإعدادات الافتراضية
            </button>
        </div>

    </div>

</div>

<script type="module" src="js/app.js?v=1.2"></script>

</body>
</html>
